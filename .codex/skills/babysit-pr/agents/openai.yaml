interface:
  display_name: "PR Babysitter"
  short_description: "Watch PR CI, reviews, and merge conflicts"
  default_prompt: "Babysit the current PR: monitor CI, reviewer comments, merge-conflict status, actionable GitHub Copilot/Codex feedback, and Codex review progress (prefer the watcher’s --watch mode for live monitoring). If the watcher reports `review_signal.status == \"in_review\"` or `actions` includes `review_in_progress`, treat the PR status as `in review` and keep waiting rather than declaring it ready. When you handle actionable GitHub Copilot or Codex review feedback, prefer `gh_pr_review_feedback.py` to reply, react, and resolve the related review threads before resuming the watcher. Fix valid issues, push updates, and rerun flaky failures up to 3 times. Keep exactly one watcher session active for the PR (do not leave duplicate --watch terminals running). If you pause monitoring to patch review/CI feedback, restart --watch yourself immediately after the push in the same turn. If a watcher is still running and no strict stop condition has been reached, the task is still in progress: keep consuming watcher output and sending progress updates instead of ending the turn. Continue polling autonomously after any push/rerun until a strict terminal stop condition is reached or the user interrupts."
