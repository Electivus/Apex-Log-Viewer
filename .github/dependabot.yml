version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 20
    groups:
      # Group tightly coupled dependency families for lower review overhead.
      # Coupled stacks stay grouped across majors to avoid peer mismatch PRs.
      react:
        applies-to: version-updates
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      radix-ui:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '@radix-ui/*'
      tailwind:
        applies-to: version-updates
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tailwindcss-*'
      testing:
        applies-to: version-updates
        patterns:
          - 'jest'
          - 'jest-*'
          - 'jest-environment-*'
          - '@types/jest'
          - '@testing-library/*'
          - 'ts-jest'
          - 'jsdom'
          - '@types/jsdom'
      typescript-tooling:
        applies-to: version-updates
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
      vscode-extension-tooling:
        applies-to: version-updates
        patterns:
          - '@vscode/test-electron'
          - '@vscode/l10n-dev'
          - '@vscode/vsce'
      nx:
        applies-to: version-updates
        patterns:
          - 'nx'
          - '@nx/*'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/vscode'
        update-types:
          - 'version-update:semver-major'
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: '@salesforce/sf-plugins-core'
        update-types:
          - 'version-update:semver-major'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 20
