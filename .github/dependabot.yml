version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 20
    groups:
      # Group tightly coupled dependency families for lower review overhead,
      # while leaving semver-major bumps as dedicated PRs.
      commitlint:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '@commitlint/*'
      react:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      tailwind:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tailwindcss-*'
      testing:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - 'jest'
          - 'jest-*'
          - 'jest-environment-*'
          - '@types/jest'
          - '@testing-library/*'
          - 'ts-jest'
          - 'jsdom'
          - '@types/jsdom'
      typescript-eslint:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '@typescript-eslint/*'
    ignore:
      - dependency-name: '@types/vscode'
        update-types:
          - 'version-update:semver-major'
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 20
