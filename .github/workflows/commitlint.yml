name: commitlint

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: read

jobs:
  lint-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    # Skip commitlint for automated bot PRs (e.g., Dependabot), since their bodies
    # include long lines/links that violate our wrapping rules and are not human-authored.
    if: ${{ github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: Install commitlint deps
        run: npm i -D @commitlint/cli @commitlint/config-conventional

      - name: Run commitlint on PR commits
        uses: wagoid/commitlint-github-action@6cf16efdf4da5277c791d335142c03a0bdf1766e
        with:
          configFile: commitlint.config.mjs
