name: E2E (Playwright • Real Org)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      vscode_version:
        description: VS Code version
        required: false
        default: stable
        type: choice
        options:
          - stable
      scratch_duration_days:
        description: Scratch org duration in days
        required: false
        default: '1'
        type: string
      playwright_workers:
        description: Playwright workers when the scratch-org pool is enabled
        required: false
        default: '1'
        type: string

concurrency:
  group: ${{ vars.SF_SCRATCH_POOL_NAME != '' && format('e2e-playwright-{0}', github.ref) || 'sf-e2e-scratch-global' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  playwright_e2e:
    name: Playwright E2E (scratch org)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ALV_E2E_TELEMETRY_RESOURCE_GROUP: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_RESOURCE_GROUP || '' }}
      ALV_E2E_TELEMETRY_LOCATION: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_LOCATION || '' }}
      ALV_E2E_TELEMETRY_APP: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_APP || '' }}
      ALV_E2E_TELEMETRY_BASE_APP: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_BASE_APP || '' }}
      ALV_E2E_TELEMETRY_WORKSPACE_RESOURCE_ID: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_WORKSPACE_RESOURCE_ID || '' }}
      HAS_AZURE_E2E_TELEMETRY_CONFIG: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_RESOURCE_GROUP != '' && vars.ALV_E2E_TELEMETRY_APP != '' && vars.ALV_E2E_TELEMETRY_BASE_APP != '' && '1' || '' }}
      SCRATCH_POOL_NAME: ${{ vars.SF_SCRATCH_POOL_NAME }}
      HAS_POOL_DEVHUB_AUTH: ${{ secrets.SF_DEVHUB_AUTH_URL != '' && '1' || '' }}
      SCRATCH_STRATEGY: pool
      PLAYWRIGHT_WORKERS: ${{ github.event.inputs.playwright_workers || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve VS Code cache metadata
        id: vscode-cache
        env:
          VSCODE_TARGET: ${{ github.event.inputs.vscode_version || 'stable' }}
          VSCODE_PLATFORM: linux-x64
        run: node scripts/resolve-vscode-cache-metadata.js

      - name: Restore VS Code test cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Require scratch-org pool configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${SCRATCH_POOL_NAME}" ]]; then
            echo "::error::SF_SCRATCH_POOL_NAME must be configured for the Playwright E2E workflow."
            missing=1
          fi
          if [[ "${HAS_POOL_DEVHUB_AUTH}" != "1" ]]; then
            echo "::error::SF_DEVHUB_AUTH_URL must be configured for the Playwright E2E workflow."
            missing=1
          fi
          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install extension dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Linux deps for Electron (best-effort)
        run: INSTALL_LINUX_DEPS=true bash scripts/install-linux-deps.sh

      - name: Azure login for dedicated App Insights validation
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && env.HAS_AZURE_E2E_TELEMETRY_CONFIG == '1' }}
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run CLI real-org E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          npm run test:e2e:cli
        env:
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: DevHubElectivus
          SF_SCRATCH_DURATION: ${{ github.event.inputs.scratch_duration_days || '1' }}
          SF_TEST_KEEP_ORG: '1'

      - name: Upload CLI E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: playwright-cli-e2e
          path: output/playwright-cli/
          if-no-files-found: ignore

      - name: Run Playwright E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          if [[ -n "${AZURE_CLIENT_ID}" && -n "${AZURE_TENANT_ID}" && -n "${AZURE_SUBSCRIPTION_ID}" && "${HAS_AZURE_E2E_TELEMETRY_CONFIG}" == "1" ]]; then
            echo "Running full Playwright E2E with dedicated App Insights validation."
            npm run test:e2e:telemetry
          else
            echo "Azure OIDC secrets or E2E telemetry target variables are not fully configured; running the full Playwright E2E suite without telemetry validation."
            npm run test:e2e
          fi
        env:
          VSCODE_TEST_VERSION: ${{ github.event.inputs.vscode_version || 'stable' }}
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: DevHubElectivus
          SF_SCRATCH_DURATION: ${{ github.event.inputs.scratch_duration_days || '1' }}
          SF_TEST_KEEP_ORG: '1'

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: playwright-e2e
          path: output/playwright/
          if-no-files-found: ignore
