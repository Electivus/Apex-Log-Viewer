name: E2E (Playwright • Real Org)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      vscode_version:
        description: VS Code version
        required: false
        default: stable
        type: choice
        options:
          - stable
      scratch_duration_days:
        description: Optional scratch org duration override in days
        required: false
        type: string
      playwright_workers:
        description: Optional Playwright worker override for CLI and direct OS E2E lanes
        required: false
        type: string
      playwright_extension_proxy_lab_workers:
        description: Optional Playwright worker override for the Ubuntu extension proxy-lab lane
        required: false
        type: string

concurrency:
  group: ${{ vars.SF_SCRATCH_POOL_NAME != '' && format('e2e-playwright-pool-{0}', vars.SF_SCRATCH_POOL_NAME) || 'sf-e2e-scratch-global' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  playwright_e2e:
    name: Playwright E2E (scratch org)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ALV_E2E_TELEMETRY_RESOURCE_GROUP: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_RESOURCE_GROUP || '' }}
      ALV_E2E_TELEMETRY_LOCATION: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_LOCATION || '' }}
      ALV_E2E_TELEMETRY_APP: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_APP || '' }}
      ALV_E2E_TELEMETRY_BASE_APP: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_BASE_APP || '' }}
      ALV_E2E_TELEMETRY_WORKSPACE_RESOURCE_ID: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_WORKSPACE_RESOURCE_ID || '' }}
      HAS_AZURE_E2E_TELEMETRY_CONFIG: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && vars.ALV_E2E_TELEMETRY_RESOURCE_GROUP != '' && vars.ALV_E2E_TELEMETRY_APP != '' && vars.ALV_E2E_TELEMETRY_BASE_APP != '' && '1' || '' }}
      SCRATCH_POOL_NAME: ${{ vars.SF_SCRATCH_POOL_NAME }}
      HAS_POOL_DEVHUB_AUTH: ${{ secrets.SF_DEVHUB_AUTH_URL != '' && '1' || '' }}
      SCRATCH_STRATEGY: pool
      VSCODE_TEST_VERSION: ${{ vars.VSCODE_TEST_VERSION || github.event.inputs.vscode_version || 'stable' }}
      SALESFORCE_CLI_PACKAGE: ${{ vars.SALESFORCE_CLI_PACKAGE || '@salesforce/cli@2.136.8' }}
      PLAYWRIGHT_WORKERS: ${{ github.event.inputs.playwright_workers || vars.PLAYWRIGHT_WORKERS || '1' }}
      PLAYWRIGHT_EXTENSION_PROXY_LAB_WORKERS: ${{ github.event.inputs.playwright_extension_proxy_lab_workers || vars.PLAYWRIGHT_EXTENSION_PROXY_LAB_WORKERS || '1' }}
      PLAYWRIGHT_RETRIES: ${{ vars.PLAYWRIGHT_RETRIES || '0' }}
      PLAYWRIGHT_TIMEOUT_MS: ${{ vars.PLAYWRIGHT_TIMEOUT_MS || '360000' }}
      PLAYWRIGHT_EXPECT_TIMEOUT_MS: ${{ vars.PLAYWRIGHT_EXPECT_TIMEOUT_MS || '60000' }}
      SF_DEVHUB_ALIAS: ${{ vars.SF_DEVHUB_ALIAS || 'DevHubElectivus' }}
      SF_SCRATCH_DURATION: ${{ github.event.inputs.scratch_duration_days || vars.SF_SCRATCH_DURATION || '1' }}
      SF_TEST_KEEP_ORG: ${{ vars.SF_TEST_KEEP_ORG || '1' }}
      INSTALL_LINUX_DEPS: ${{ vars.INSTALL_LINUX_DEPS || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve VS Code cache metadata
        id: vscode-cache
        env:
          VSCODE_TARGET: ${{ env.VSCODE_TEST_VERSION }}
          VSCODE_PLATFORM: linux-x64
        run: node scripts/resolve-vscode-cache-metadata.js

      - name: Restore VS Code test cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}

      - name: Install Salesforce CLI
        run: npm install -g "${{ env.SALESFORCE_CLI_PACKAGE }}" --no-audit --no-fund

      - name: Require scratch-org pool configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${SCRATCH_POOL_NAME}" ]]; then
            echo "::error::SF_SCRATCH_POOL_NAME must be configured for the Playwright E2E workflow."
            missing=1
          fi
          if [[ "${HAS_POOL_DEVHUB_AUTH}" != "1" ]]; then
            echo "::error::SF_DEVHUB_AUTH_URL must be configured for the Playwright E2E workflow."
            missing=1
          fi
          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install extension dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Linux deps for Electron (best-effort)
        run: bash scripts/install-linux-deps.sh

      - name: Run CLI real-org E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          npm run test:e2e:proxy-lab -- npm run test:e2e:cli
        env:
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: ${{ env.SF_DEVHUB_ALIAS }}
          SF_SCRATCH_DURATION: ${{ env.SF_SCRATCH_DURATION }}
          SF_TEST_KEEP_ORG: ${{ env.SF_TEST_KEEP_ORG }}
          ALV_E2E_PROXY_LAB_DEVHUB_ALIAS: ${{ env.SF_DEVHUB_ALIAS }}

      - name: Upload CLI E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-cli-e2e
          path: output/playwright-cli/
          if-no-files-found: ignore

      - name: Azure login for dedicated App Insights validation
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' && env.HAS_AZURE_E2E_TELEMETRY_CONFIG == '1' }}
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run Playwright E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          if [[ -n "${AZURE_CLIENT_ID}" && -n "${AZURE_TENANT_ID}" && -n "${AZURE_SUBSCRIPTION_ID}" && "${HAS_AZURE_E2E_TELEMETRY_CONFIG}" == "1" ]]; then
            echo "Running full Playwright E2E with dedicated App Insights validation through the MITM proxy lab."
            npm run test:e2e:telemetry
          else
            echo "Azure OIDC secrets or E2E telemetry target variables are not fully configured; running the full Playwright E2E suite without telemetry validation through the MITM proxy lab."
            npm run test:e2e:proxy-lab -- npm run test:e2e
          fi
        env:
          VSCODE_TEST_VERSION: ${{ env.VSCODE_TEST_VERSION }}
          ALV_E2E_TELEMETRY_PROXY_LAB: '1'
          ALV_E2E_PROXY_LAB_SKIP_NPM_CI: ${{ vars.ALV_E2E_PROXY_LAB_SKIP_NPM_CI || '1' }}
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_EXTENSION_PROXY_LAB_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: ${{ env.SF_DEVHUB_ALIAS }}
          SF_SCRATCH_DURATION: ${{ env.SF_SCRATCH_DURATION }}
          SF_TEST_KEEP_ORG: ${{ env.SF_TEST_KEEP_ORG }}
          ALV_E2E_PROXY_LAB_DEVHUB_ALIAS: ${{ env.SF_DEVHUB_ALIAS }}

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-e2e
          path: output/playwright/
          if-no-files-found: ignore

  playwright_e2e_os_matrix:
    name: Playwright E2E Direct (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            vscode_platform: win32-x64-archive
            artifact_suffix: windows
          - os: macos-latest
            vscode_platform: darwin-arm64
            artifact_suffix: macos
    env:
      SCRATCH_POOL_NAME: ${{ vars.SF_SCRATCH_POOL_NAME }}
      HAS_POOL_DEVHUB_AUTH: ${{ secrets.SF_DEVHUB_AUTH_URL != '' && '1' || '' }}
      SCRATCH_STRATEGY: pool
      VSCODE_TEST_VERSION: ${{ vars.VSCODE_TEST_VERSION || github.event.inputs.vscode_version || 'stable' }}
      SALESFORCE_CLI_PACKAGE: ${{ vars.SALESFORCE_CLI_PACKAGE || '@salesforce/cli@2.136.8' }}
      SALESFORCE_CLI_NODE_VERSION: ${{ vars.SALESFORCE_CLI_NODE_VERSION || '20' }}
      PLAYWRIGHT_WORKERS: ${{ github.event.inputs.playwright_workers || vars.PLAYWRIGHT_WORKERS || '1' }}
      PLAYWRIGHT_RETRIES: ${{ vars.PLAYWRIGHT_RETRIES || '0' }}
      PLAYWRIGHT_TIMEOUT_MS: ${{ vars.PLAYWRIGHT_TIMEOUT_MS || '360000' }}
      PLAYWRIGHT_EXPECT_TIMEOUT_MS: ${{ vars.PLAYWRIGHT_EXPECT_TIMEOUT_MS || '60000' }}
      SF_DEVHUB_ALIAS: ${{ vars.SF_DEVHUB_ALIAS || 'DevHubElectivus' }}
      SF_SCRATCH_DURATION: ${{ github.event.inputs.scratch_duration_days || vars.SF_SCRATCH_DURATION || '1' }}
      SF_TEST_KEEP_ORG: ${{ vars.SF_TEST_KEEP_ORG || '1' }}
    steps:
      - name: Disable Windows autocrlf
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve VS Code cache metadata
        id: vscode-cache
        env:
          VSCODE_TARGET: ${{ env.VSCODE_TEST_VERSION }}
          VSCODE_PLATFORM: ${{ matrix.vscode_platform }}
        run: node scripts/resolve-vscode-cache-metadata.js

      - name: Restore VS Code test cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}

      - name: Setup Salesforce CLI Node.js
        if: runner.os == 'macOS'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Node 22.23 can exit with "Detected unsettled top-level await" for
          # @salesforce/cli inside the VS Code macOS test host.
          node-version: ${{ env.SALESFORCE_CLI_NODE_VERSION }}

      - name: Install Salesforce CLI
        run: npm install -g "${{ env.SALESFORCE_CLI_PACKAGE }}" --no-audit --no-fund

      - name: Export Salesforce CLI Node.js runtime
        if: runner.os == 'macOS'
        shell: bash
        run: |
          node_path="$(command -v node)"
          sf_bin_path="$(command -v sf)"
          wrapper_dir="${RUNNER_TEMP}/alv-sf-node20"
          wrapper_path="${wrapper_dir}/sf"
          mkdir -p "$wrapper_dir"
          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo 'unset ELECTRON_RUN_AS_NODE || true'
            echo 'unset NODE_OPTIONS || true'
            echo 'unset VSCODE_AMD_ENTRYPOINT || true'
            echo 'unset VSCODE_CODE_CACHE_PATH || true'
            echo 'unset VSCODE_CWD || true'
            echo 'unset VSCODE_ESM_ENTRYPOINT || true'
            echo 'unset VSCODE_HANDLES_UNCAUGHT_ERRORS || true'
            echo 'unset VSCODE_IPC_HOOK || true'
            echo 'unset VSCODE_IPC_HOOK_CLI || true'
            echo 'unset VSCODE_NLS_CONFIG || true'
            echo 'unset VSCODE_PID || true'
            echo "export PATH=\"$(dirname "$node_path"):\${PATH:-}\""
            printf 'exec %q "$@"\n' "$sf_bin_path"
          } > "$wrapper_path"
          chmod +x "$wrapper_path"
          echo "SF_CLI_NODE_PATH=${node_path}" >> "$GITHUB_ENV"
          echo "SF_CLI_BIN_PATH=${wrapper_path}" >> "$GITHUB_ENV"
          echo "ALV_SF_BIN_PATH=${wrapper_path}" >> "$GITHUB_ENV"

      - name: Restore Node.js from .nvmrc
        if: runner.os == 'macOS'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Require scratch-org pool configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${SCRATCH_POOL_NAME}" ]]; then
            echo "::error::SF_SCRATCH_POOL_NAME must be configured for the Playwright E2E workflow."
            missing=1
          fi
          if [[ "${HAS_POOL_DEVHUB_AUTH}" != "1" ]]; then
            echo "::error::SF_DEVHUB_AUTH_URL must be configured for the Playwright E2E workflow."
            missing=1
          fi
          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install extension dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run CLI real-org E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          echo "Direct E2E OS: ${{ matrix.artifact_suffix }}"
          npm run test:e2e:cli
        env:
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}/${{ matrix.artifact_suffix }}
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: ${{ env.SF_DEVHUB_ALIAS }}
          SF_SCRATCH_DURATION: ${{ env.SF_SCRATCH_DURATION }}
          SF_TEST_KEEP_ORG: ${{ env.SF_TEST_KEEP_ORG }}

      - name: Upload CLI E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-cli-e2e-${{ matrix.artifact_suffix }}
          path: output/playwright-cli/
          if-no-files-found: ignore

      - name: Run Playwright E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          echo "Direct E2E OS: ${{ matrix.artifact_suffix }}"
          npm run test:e2e
        env:
          VSCODE_TEST_VERSION: ${{ env.VSCODE_TEST_VERSION }}
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}/${{ matrix.artifact_suffix }}
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: ${{ env.SF_DEVHUB_ALIAS }}
          SF_SCRATCH_DURATION: ${{ env.SF_SCRATCH_DURATION }}
          SF_TEST_KEEP_ORG: ${{ env.SF_TEST_KEEP_ORG }}

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-e2e-${{ matrix.artifact_suffix }}
          path: output/playwright/
          if-no-files-found: ignore
