name: E2E (Playwright • Real Org)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      vscode_version:
        description: VS Code version
        required: false
        default: stable
        type: choice
        options:
          - stable
      scratch_duration_days:
        description: Scratch org duration in days
        required: false
        default: '1'
        type: string
      keep_scratch_org:
        description: Keep the scratch org after the run
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  playwright_e2e:
    name: Playwright E2E (scratch org)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install extension dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Linux deps for Electron (best-effort)
        run: INSTALL_LINUX_DEPS=true bash scripts/install-linux-deps.sh

      - name: Azure login for dedicated App Insights validation
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run Playwright E2E
        shell: bash
        run: |
          if [[ -n "${AZURE_CLIENT_ID}" && -n "${AZURE_TENANT_ID}" && -n "${AZURE_SUBSCRIPTION_ID}" ]]; then
            echo "Running full Playwright E2E with dedicated App Insights validation."
            npm run test:e2e:telemetry
          else
            echo "Azure OIDC secrets are not configured; falling back to the smoke E2E run."
            npm run test:e2e -- openLogViewer.e2e.spec.ts
          fi
        env:
          VSCODE_TEST_VERSION: ${{ github.event.inputs.vscode_version || 'stable' }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: DevHubElectivus
          SF_SCRATCH_ALIAS: ALV_E2E_Scratch_${{ github.run_id }}_${{ github.run_attempt }}
          SF_SCRATCH_DURATION: ${{ github.event.inputs.scratch_duration_days || '1' }}
          # Default behavior:
          # - pull_request: delete scratch org (avoid leaking scratch orgs on every PR update)
          # - workflow_dispatch: keep unless explicitly disabled
          SF_TEST_KEEP_ORG: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.keep_scratch_org == 'false' && '' || '1') || '' }}

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-e2e
          path: output/playwright/
          if-no-files-found: ignore
