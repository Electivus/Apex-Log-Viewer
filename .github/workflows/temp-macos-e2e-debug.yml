name: TEMP macOS E2E Debug

on:
  push:
    branches:
      - codex/cover-skill-install-codex-home-env
  workflow_dispatch:
    inputs:
      spec:
        description: Playwright spec to run
        required: false
        default: test/e2e/specs/debugFlagsFilter.e2e.spec.ts
        type: string
      vscode_version:
        description: VS Code version
        required: false
        default: stable
        type: choice
        options:
          - stable

concurrency:
  group: temp-macos-e2e-debug-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos_first_failure:
    name: TEMP macOS E2E first failure
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      SCRATCH_POOL_NAME: ${{ vars.SF_SCRATCH_POOL_NAME }}
      HAS_POOL_DEVHUB_AUTH: ${{ secrets.SF_DEVHUB_AUTH_URL != '' && '1' || '' }}
      SCRATCH_STRATEGY: pool
      PLAYWRIGHT_WORKERS: '1'
      PLAYWRIGHT_RETRIES: '0'
      E2E_SPEC: ${{ github.event.inputs.spec || 'test/e2e/specs/debugFlagsFilter.e2e.spec.ts' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve VS Code cache metadata
        id: vscode-cache
        env:
          VSCODE_TARGET: ${{ github.event.inputs.vscode_version || 'stable' }}
          VSCODE_PLATFORM: darwin-arm64
        run: node scripts/resolve-vscode-cache-metadata.js

      - name: Restore VS Code test cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}

      - name: Setup Salesforce CLI Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@2.136.8 --no-audit --no-fund

      - name: Export Salesforce CLI Node.js runtime
        shell: bash
        run: |
          node_path="$(command -v node)"
          sf_bin_path="$(command -v sf)"
          wrapper_path="${RUNNER_TEMP}/alv-sf-node22-wrapper.sh"
          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo 'unset ELECTRON_RUN_AS_NODE || true'
            echo 'unset NODE_OPTIONS || true'
            echo 'unset VSCODE_AMD_ENTRYPOINT || true'
            echo 'unset VSCODE_CODE_CACHE_PATH || true'
            echo 'unset VSCODE_CWD || true'
            echo 'unset VSCODE_ESM_ENTRYPOINT || true'
            echo 'unset VSCODE_HANDLES_UNCAUGHT_ERRORS || true'
            echo 'unset VSCODE_IPC_HOOK || true'
            echo 'unset VSCODE_IPC_HOOK_CLI || true'
            echo 'unset VSCODE_NLS_CONFIG || true'
            echo 'unset VSCODE_PID || true'
            echo "export PATH=\"$(dirname "$node_path"):\${PATH:-}\""
            printf 'exec %q "$@"\n' "$sf_bin_path"
          } > "$wrapper_path"
          chmod +x "$wrapper_path"
          echo "SF_CLI_NODE_PATH=${node_path}" >> "$GITHUB_ENV"
          echo "SF_CLI_BIN_PATH=${wrapper_path}" >> "$GITHUB_ENV"

      - name: Restore Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Require scratch-org pool configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${SCRATCH_POOL_NAME}" ]]; then
            echo "::error::SF_SCRATCH_POOL_NAME must be configured for the temporary macOS E2E workflow."
            missing=1
          fi
          if [[ "${HAS_POOL_DEVHUB_AUTH}" != "1" ]]; then
            echo "::error::SF_DEVHUB_AUTH_URL must be configured for the temporary macOS E2E workflow."
            missing=1
          fi
          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install extension dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run focused Playwright E2E
        shell: bash
        run: |
          echo "Scratch strategy: ${SCRATCH_STRATEGY}"
          echo "Playwright workers: ${PLAYWRIGHT_WORKERS}"
          echo "Focused spec: ${E2E_SPEC}"
          npm run test:e2e -- "${E2E_SPEC}" --max-failures=1
        env:
          VSCODE_TEST_VERSION: ${{ github.event.inputs.vscode_version || 'stable' }}
          VSCODE_TEST_LOG_LEVEL: trace
          PLAYWRIGHT_WORKERS: ${{ env.PLAYWRIGHT_WORKERS }}
          SF_SCRATCH_STRATEGY: ${{ env.SCRATCH_STRATEGY }}
          SF_SCRATCH_POOL_NAME: ${{ env.SCRATCH_POOL_NAME }}
          SF_SCRATCH_POOL_OWNER: github:${{ github.run_id }}/${{ github.run_attempt }}/temp-macos
          SF_SCRATCH_POOL_LEASE_TTL_SECONDS: ${{ vars.SF_SCRATCH_POOL_LEASE_TTL_SECONDS }}
          SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS: ${{ vars.SF_SCRATCH_POOL_WAIT_TIMEOUT_SECONDS }}
          SF_SCRATCH_POOL_HEARTBEAT_SECONDS: ${{ vars.SF_SCRATCH_POOL_HEARTBEAT_SECONDS }}
          SF_SCRATCH_POOL_MIN_REMAINING_MINUTES: ${{ vars.SF_SCRATCH_POOL_MIN_REMAINING_MINUTES }}
          SF_SCRATCH_POOL_SEED_VERSION: ${{ vars.SF_SCRATCH_POOL_SEED_VERSION }}
          SF_SCRATCH_POOL_SNAPSHOT_NAME: ${{ vars.SF_SCRATCH_POOL_SNAPSHOT_NAME }}
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
          SF_DEVHUB_ALIAS: DevHubElectivus
          SF_SCRATCH_DURATION: '1'
          SF_TEST_KEEP_ORG: '1'

      - name: Upload focused Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: temp-macos-playwright-e2e
          path: output/playwright/
          if-no-files-found: ignore
