name: Release (tags)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Build (type-check + lint + bundle)
        run: npm run build

      - name: Run tests (unit + integration)
        run: npm run test:ci

  package:
    name: Package VSIX
    needs: build_and_test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            npm_arch: x64
            cargo_target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: linux-arm64
            npm_arch: arm64
            cargo_target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: win32-x64
            npm_arch: x64
            cargo_target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: win32-arm64
            npm_arch: arm64
            cargo_target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: darwin-x64
            npm_arch: x64
            cargo_target: x86_64-apple-darwin
          - os: macos-latest
            target: darwin-arm64
            npm_arch: arm64
            cargo_target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write
    env:
      TAG_NAME: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Install Rust target for packaged runtime
        run: rustup target add ${{ matrix.cargo_target }}

      - name: Install Linux ARM64 cross-linker
        if: matrix.cargo_target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Verify tag matches extension package version
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./apps/vscode-extension/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME != apps/vscode-extension/package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Build + generate NLS assets
        run: npm run package

      - name: Build packaged runtime for target
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MATRIX_TARGET: ${{ matrix.target }}
        run: node scripts/build-runtime-target.mjs "${MATRIX_TARGET}" release

      - name: Determine channel (stable vs pre-release)
        id: determine_channel
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const pkgPath = path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'apps', 'vscode-extension', 'package.json');
            const version = JSON.parse(fs.readFileSync(pkgPath, 'utf8')).version;
            const minor = Number((version || '').split('.')[1] || 0);
            const tagName = process.env.TAG_NAME || '';
            let preRelease = minor % 2 === 1;
            if (/-pre|-beta|-alpha|-rc/.test(tagName)) {
              preRelease = true;
            }
            core.exportVariable('VERSION', version);
            core.exportVariable('PRE_RELEASE', preRelease ? 'true' : 'false');
            core.exportVariable('CHANNEL_SUFFIX', preRelease ? 'pre' : 'stable');
            core.setOutput('version', version);
            core.setOutput('pre_release', preRelease ? 'true' : 'false');
            core.setOutput('channel_suffix', preRelease ? 'pre' : 'stable');

      - name: Clean previous VSIX artifacts
        run: |
          node -e "const fs=require('fs');for (const f of fs.readdirSync('.')) if (f.endsWith('.vsix')) fs.rmSync(f);"

      - name: Package VSIX target
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.determine_channel.outputs.version }}
          CHANNEL_SUFFIX: ${{ steps.determine_channel.outputs.channel_suffix }}
          PRE_RELEASE: ${{ steps.determine_channel.outputs.pre_release }}
        run: |
          PRE_ARGS=()
          if [ "${PRE_RELEASE}" = "true" ]; then
            PRE_ARGS+=(--pre-release)
          fi
          node scripts/run-vsce.js package --skip-prepublish --no-yarn --target "${MATRIX_TARGET}" --out "apex-log-viewer-${VERSION}-${CHANNEL_SUFFIX}-${MATRIX_TARGET}.vsix" "${PRE_ARGS[@]}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: apex-log-viewer-${{ steps.determine_channel.outputs.version }}-${{ steps.determine_channel.outputs.channel_suffix }}-vsix-${{ matrix.target }}
          path: |
            *.vsix
          if-no-files-found: error

  prepare_publish:
    name: Prepare release publishing
    if: github.repository == 'Electivus/Apex-Log-Viewer'
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.determine_channel.outputs.version }}
      pre_release: ${{ steps.determine_channel.outputs.pre_release }}
      channel_suffix: ${{ steps.determine_channel.outputs.channel_suffix }}
      artifact_name: apex-log-viewer-${{ steps.determine_channel.outputs.version }}-${{ steps.determine_channel.outputs.channel_suffix }}-publish-vsix
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Verify tag matches extension package version
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./apps/vscode-extension/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME != apps/vscode-extension/package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Determine channel (stable vs pre-release)
        id: determine_channel
        env:
          TAG_NAME: ${{ github.ref_name }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const pkgPath = path.join(
              process.env.GITHUB_WORKSPACE || process.cwd(),
              'apps',
              'vscode-extension',
              'package.json'
            );
            const version = JSON.parse(fs.readFileSync(pkgPath, 'utf8')).version;
            const minor = Number((version || '').split('.')[1] || 0);
            const tagName = process.env.TAG_NAME || '';
            let preRelease = minor % 2 === 1;
            if (/-pre|-beta|-alpha|-rc/.test(tagName)) {
              preRelease = true;
            }
            core.exportVariable('VERSION', version);
            core.exportVariable('PRE_RELEASE', preRelease ? 'true' : 'false');
            core.exportVariable('CHANNEL_SUFFIX', preRelease ? 'pre' : 'stable');
            core.setOutput('version', version);
            core.setOutput('pre_release', preRelease ? 'true' : 'false');
            core.setOutput('channel_suffix', preRelease ? 'pre' : 'stable');

      - name: Ensure GitHub release exists
        env:
          TAG_NAME: ${{ github.ref_name }}
          PRE_RELEASE: ${{ steps.determine_channel.outputs.pre_release }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists"
          else
            TITLE="${TAG_NAME}"
            NOTES="Automated placeholder release created by CI."
            if [ "${PRE_RELEASE}" = "true" ]; then
              gh release create "${TAG_NAME}" --title "${TITLE}" --notes "${NOTES}" --prerelease
            else
              gh release create "${TAG_NAME}" --title "${TITLE}" --notes "${NOTES}"
            fi
          fi

      - name: Set GitHub Release prerelease flag automatically
        env:
          TAG_NAME: ${{ github.ref_name }}
          PRE_RELEASE: ${{ steps.determine_channel.outputs.pre_release }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Setting prerelease=${PRE_RELEASE} for ${TAG_NAME}"
          RID=$(gh release view "${TAG_NAME}" --json databaseId -q .databaseId)
          if [ "${PRE_RELEASE}" = "true" ]; then
            gh api -X PATCH repos/${{ github.repository }}/releases/$RID -f prerelease=true
          else
            gh api -X PATCH repos/${{ github.repository }}/releases/$RID -f prerelease=false
          fi

      - name: Download packaged VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: apex-log-viewer-${{ steps.determine_channel.outputs.version }}-${{ steps.determine_channel.outputs.channel_suffix }}-vsix-*
          path: ${{ github.workspace }}/vsix

      - name: Collect VSIX files
        shell: bash
        run: |
          set -euo pipefail
          VSIX_DIR="${GITHUB_WORKSPACE}/vsix"
          if [ ! -d "${VSIX_DIR}" ]; then
            echo "VSIX artifact directory not found: ${VSIX_DIR}" >&2
            exit 1
          fi
          find "${VSIX_DIR}" -name '*.vsix' -exec mv {} . \;

      - name: Upload VSIX artifact for marketplace publish jobs
        uses: actions/upload-artifact@v7
        with:
          name: apex-log-viewer-${{ steps.determine_channel.outputs.version }}-${{ steps.determine_channel.outputs.channel_suffix }}-publish-vsix
          path: |
            ./*.vsix
          if-no-files-found: error

      - name: Create or update GitHub release (pre-release)
        if: steps.determine_channel.outputs.pre_release == 'true'
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE="$TAG"
          BODY="Automated pre-release."
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing pre-release $TAG"
            gh release edit "$TAG" --title "$TITLE" --notes "$BODY" --prerelease
          else
            echo "Creating pre-release $TAG"
            gh release create "$TAG" --title "$TITLE" --notes "$BODY" --prerelease
          fi
          # Upload VSIX(es) built in the package job
          gh release upload "$TAG" ./*.vsix --clobber

      - name: Create or update GitHub release (stable)
        if: steps.determine_channel.outputs.pre_release != 'true'
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE="$TAG"
          BODY="Automated stable release."
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing release $TAG"
            gh release edit "$TAG" --title "$TITLE" --notes "$BODY"
          else
            echo "Creating release $TAG"
            gh release create "$TAG" --title "$TITLE" --notes "$BODY"
          fi
          # Upload VSIX(es) built in the package job
          gh release upload "$TAG" ./*.vsix --clobber

  # Note: CHANGELOG.md is maintained manually by the project.

  publish_marketplace:
    name: Publish to VS Code Marketplace
    if: github.repository == 'Electivus/Apex-Log-Viewer'
    needs: prepare_publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: marketplace
    steps:
      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare_publish.outputs.artifact_name }}
          path: .

      - name: Publish from VSIX artifact
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          PRE_RELEASE: ${{ needs.prepare_publish.outputs.pre_release }}
          VERSION: ${{ needs.prepare_publish.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT not set; skipping Marketplace publish."
            exit 0
          fi
          shopt -s nullglob
          FILES=( *.vsix )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No VSIX found to publish" >&2
            exit 1
          fi
          for FILE in "${FILES[@]}"; do
            if [ "${PRE_RELEASE}" = "true" ]; then
              echo "Publishing pre-release ${VERSION} from ${FILE}"
              npx --yes @vscode/vsce publish --packagePath "${FILE}" --pre-release
            else
              echo "Publishing stable ${VERSION} from ${FILE}"
              npx --yes @vscode/vsce publish --packagePath "${FILE}"
            fi
          done

  publish_open_vsx:
    name: Publish to Open VSX
    if: github.repository == 'Electivus/Apex-Log-Viewer'
    needs: prepare_publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: marketplace
    steps:
      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare_publish.outputs.artifact_name }}
          path: .

      - name: Publish to Open VSX from VSIX artifact
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          PRE_RELEASE: ${{ needs.prepare_publish.outputs.pre_release }}
          VERSION: ${{ needs.prepare_publish.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT not set; skipping Open VSX publish."
            exit 0
          fi
          shopt -s nullglob
          FILES=( *.vsix )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No VSIX found to publish" >&2
            exit 1
          fi
          for FILE in "${FILES[@]}"; do
            if [ "${PRE_RELEASE}" = "true" ]; then
              echo "Publishing pre-release ${VERSION} to Open VSX from ${FILE}"
              npx --yes ovsx publish --pat "${OVSX_PAT}" --packagePath "${FILE}" --pre-release
            else
              echo "Publishing stable ${VERSION} to Open VSX from ${FILE}"
              npx --yes ovsx publish --pat "${OVSX_PAT}" --packagePath "${FILE}"
            fi
          done
