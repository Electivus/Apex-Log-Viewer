name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      scope:
        description: "Optional test scope (unit|integration|all)"
        required: false
        default: unit
        type: choice
        options:
          - unit
          - integration
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            vscode_platform: linux-x64
          - os: windows-latest
            vscode_platform: win32-x64-archive
          - os: macos-latest
            vscode_platform: darwin-arm64
    steps:
      - name: Disable Windows autocrlf
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve VS Code cache metadata
        id: vscode-cache
        env:
          VSCODE_TARGET: stable
          VSCODE_PLATFORM: ${{ matrix.vscode_platform }}
        run: node scripts/resolve-vscode-cache-metadata.js

      - name: Restore VS Code test cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify npm package signatures
        run: pnpm run security:pnpm-signatures

      - name: Type-check and lint
        run: pnpm run compile

      - name: Build (bundle)
        run: pnpm run build

      - name: Run tests
        shell: bash
        run: |
          case "${{ github.event.inputs.scope || 'unit' }}" in
            unit) pnpm run test:unit:ci ;;
            integration) pnpm run test:integration:ci ;;
            all) pnpm run test:ci ;;
            *) pnpm run test:unit:ci ;;
          esac

  smoke_vsix:
    name: VSIX Smoke Test
    needs: build_and_test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.build_and_test.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Resolve VS Code cache metadata
        id: vscode-cache
        env:
          VSCODE_TARGET: stable
          VSCODE_PLATFORM: linux-x64
        run: node scripts/resolve-vscode-cache-metadata.js
      - name: Restore VS Code test cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}
      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build and run VSIX smoke
        run: pnpm run test:smoke:vsix
        env:
          ALWAYS_SMOKE_VSIX: "1"
