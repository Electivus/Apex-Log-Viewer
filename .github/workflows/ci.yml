name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      scope:
        description: "Optional test scope (unit|integration|all)"
        required: false
        default: unit
        type: choice
        options:
          - unit
          - integration
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve VS Code cache metadata
        id: vscode-cache
        shell: bash
        env:
          VSCODE_TARGET: stable
        run: |
          set -euo pipefail
          target="${VSCODE_TARGET:-stable}"
          if [[ "${target}" == "stable" ]]; then
            json="$(curl -fsSL https://update.code.visualstudio.com/api/update/linux-x64/stable/latest)"
            mapfile -t vscode_meta < <(printf '%s' "${json}" | node -e "let data='';process.stdin.on('data',chunk=>data+=chunk);process.stdin.on('end',()=>{const parsed=JSON.parse(data);console.log(parsed.productVersion || parsed.name || 'stable');console.log(parsed.version || parsed.hash || parsed.productVersion || 'stable');});")
            version="${vscode_meta[0]}"
            build="${vscode_meta[1]}"
          else
            safe_target="${target//[^A-Za-z0-9._-]/-}"
            version="${safe_target}"
            build="${safe_target}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build=${build}" >> "${GITHUB_OUTPUT}"

      - name: Restore VS Code test cache
        uses: actions/cache@v4
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Type-check and lint
        run: npm run compile

      - name: Build (bundle)
        run: npm run build

      - name: Run tests
        run: |
          case "${{ github.event.inputs.scope || 'unit' }}" in
            unit) npm run test:unit:ci ;;
            integration) npm run test:integration:ci ;;
            all) npm run test:ci ;;
            *) npm run test:unit:ci ;;
          esac

  smoke_vsix:
    name: VSIX Smoke Test
    needs: build_and_test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.build_and_test.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Resolve VS Code cache metadata
        id: vscode-cache
        shell: bash
        env:
          VSCODE_TARGET: stable
        run: |
          set -euo pipefail
          target="${VSCODE_TARGET:-stable}"
          if [[ "${target}" == "stable" ]]; then
            json="$(curl -fsSL https://update.code.visualstudio.com/api/update/linux-x64/stable/latest)"
            mapfile -t vscode_meta < <(printf '%s' "${json}" | node -e "let data='';process.stdin.on('data',chunk=>data+=chunk);process.stdin.on('end',()=>{const parsed=JSON.parse(data);console.log(parsed.productVersion || parsed.name || 'stable');console.log(parsed.version || parsed.hash || parsed.productVersion || 'stable');});")
            version="${vscode_meta[0]}"
            build="${vscode_meta[1]}"
          else
            safe_target="${target//[^A-Za-z0-9._-]/-}"
            version="${safe_target}"
            build="${safe_target}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build=${build}" >> "${GITHUB_OUTPUT}"
      - name: Restore VS Code test cache
        uses: actions/cache@v4
        with:
          path: .vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.vscode-cache.outputs.version }}-${{ steps.vscode-cache.outputs.build }}
      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build and run VSIX smoke
        run: npm run test:smoke:vsix
        env:
          ALWAYS_SMOKE_VSIX: "1"
