name: Pre-release (nightly)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      label:
        description: 'Optional label for the nightly tag/title (defaults to date)'
        required: false
        type: string

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check_changes:
    name: Check for changes since last pre-release
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Detect changes since last pre-release
        id: check
        run: |
          set -euo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          AT_HEAD=$(git tag --points-at "$HEAD_SHA" | grep -E '^(v[0-9]+\.[0-9]+\.[0-9]+|pre-[0-9]+\.[0-9]+\.[0-9]+)$' || true)
          if [ -n "$AT_HEAD" ]; then
            echo "HEAD already tagged: $AT_HEAD (skipping nightly)"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | (grep -E '^v[0-9]+\.[0-9]*[13579]\.[0-9]+$' || true) | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git tag --list 'pre-*' --sort=-v:refname | head -n 1)
          fi
          if [ -z "$LAST_TAG" ]; then
            echo "No pre-release tags found; proceeding"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "Latest pre-release tag: $LAST_TAG"
            TAG_SHA=$(git rev-list -n1 "$LAST_TAG")
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "No changes since last pre-release"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "Changes detected since $LAST_TAG"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          fi

  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check_changes
    if: needs.check_changes.outputs.has_changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Build (type-check + lint + bundle)
        run: npm run package

      - name: Run unit tests (fast)
        run: npm run test:unit:ci

  prepare:
    name: Prepare nightly metadata
    needs: [check_changes]
    if: needs.check_changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      label: ${{ steps.meta.outputs.label }}
      shortsha: ${{ steps.meta.outputs.shortsha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Compute nightly version
        id: meta
        shell: bash
        env:
          INPUT_LABEL: ${{ github.event.inputs.label || '' }}
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./apps/vscode-extension/package.json').version")
          NEW_VERSION=$(node scripts/compute-prerelease-version.mjs --manifest apps/vscode-extension/package.json)
          SHORTSHA=$(git rev-parse --short HEAD)
          if [ -z "$INPUT_LABEL" ]; then
            LABEL=$(date -u +%Y%m%d)
          else
            LABEL="$INPUT_LABEL"
          fi
          echo "Computed nightly version: $BASE_VERSION -> $NEW_VERSION"
          {
            echo "version=$NEW_VERSION"
            echo "tag=v$NEW_VERSION"
            echo "label=$LABEL"
            echo "shortsha=$SHORTSHA"
          } >> "$GITHUB_OUTPUT"

  package_vsix:
    name: Package VSIX
    needs: [prepare, build_and_test, check_changes]
    if: needs.check_changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            npm_arch: x64
          - os: ubuntu-latest
            target: linux-arm64
            npm_arch: arm64
          - os: windows-latest
            target: win32-x64
            npm_arch: x64
          - os: windows-latest
            target: win32-arm64
            npm_arch: arm64
          - os: macos-latest
            target: darwin-x64
            npm_arch: x64
          - os: macos-latest
            target: darwin-arm64
            npm_arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      PRE_RELEASE: 'true'
      CHANNEL_SUFFIX: pre
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Enforce dependency source policy
        run: node scripts/check-dependency-sources.mjs

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Set nightly version in apps/vscode-extension/package.json
        run: |
          node -e "const fs=require('fs');const pkgPath='apps/vscode-extension/package.json';const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));pkg.version=process.env.VERSION;fs.writeFileSync(pkgPath,JSON.stringify(pkg,null,2)+'\n')"

      - name: Build extension packaging assets
        shell: bash
        run: |
          set -euo pipefail
          npm run clean
          npm run build:tree-sitter-runtime
          npm run build:package-metadata
          node apps/vscode-extension/esbuild.extension.mjs
          (npm run -s nls:extract || true)
          npm run nls:write
          npm run build:webview

      - name: Fetch packaged runtime for target
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: node scripts/fetch-runtime-release.mjs "${MATRIX_TARGET}"

      - name: Verify fetched linux-x64 runtime compatibility
        if: matrix.target == 'linux-x64'
        run: node scripts/verify-runtime-compatibility.mjs --target linux-x64 --binary "apps/vscode-extension/bin/linux-x64/apex-log-viewer"

      - name: Clean previous VSIX artifacts
        run: |
          node -e "const fs=require('fs');for (const f of fs.readdirSync('.')) if (f.endsWith('.vsix')) fs.rmSync(f);"

      - name: Package VSIX target
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          node scripts/run-vsce.js package --skip-prepublish --no-yarn --target "${MATRIX_TARGET}" --out "apex-log-viewer-${VERSION}-${CHANNEL_SUFFIX}-${MATRIX_TARGET}.vsix" --pre-release

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-vsix-${{ matrix.target }}
          path: |
            *.vsix

  assemble_release:
    name: Create GitHub pre-release + VSIX artifact
    needs: [package_vsix, prepare, check_changes]
    if: needs.check_changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      LABEL: ${{ needs.prepare.outputs.label }}
      SHORTSHA: ${{ needs.prepare.outputs.shortsha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download packaged VSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: nightly-vsix-*
          path: staging

      - name: Collect VSIX files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          find staging -name '*.vsix' -exec mv {} . \;

      - name: Rename VSIX with timestamp
        id: rename
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(apex-log-viewer-${VERSION}-pre-*.vsix)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No VSIX files found to rename" >&2
            exit 1
          fi
          for FILE in "${FILES[@]}"; do
            TARGET=${FILE#apex-log-viewer-${VERSION}-pre-}
            TARGET=${TARGET%.vsix}
            NEW_NAME="apex-log-viewer-${VERSION}-pre-${LABEL}-${SHORTSHA}-${TARGET}.vsix"
            mv "$FILE" "$NEW_NAME"
            echo "Renamed $FILE -> $NEW_NAME"
          done

      - name: Upload VSIX artifact for publish
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-vsix
          path: |
            ./*.vsix

      - name: Create or update GitHub pre-release
        shell: bash
        run: |
          set -euo pipefail
          TITLE="$TAG"
          BODY="Automated nightly build.\n\nCommit: $GITHUB_SHA\nRun: $GITHUB_RUN_NUMBER"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing pre-release $TAG"
            gh release edit "$TAG" --title "$TITLE" --notes "$BODY" --prerelease
          else
            echo "Creating pre-release $TAG"
            gh release create "$TAG" --title "$TITLE" --notes "$BODY" --prerelease
          fi

      - name: Upload VSIX to GitHub release
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=( *.vsix )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No VSIX files found to upload" >&2
            exit 1
          fi
          existing=$(gh release view "$TAG" --json assets --jq '.assets[].name' || true)
          for FILE in "${FILES[@]}"; do
            if echo "$existing" | grep -x "$FILE" >/dev/null 2>&1; then
              gh release delete-asset "$TAG" "$FILE" -y || true
            fi
            gh release upload "$TAG" "$FILE" --clobber
          done

  publish_marketplace:
    name: Publish to VS Code Marketplace (pre-release channel)
    needs: [assemble_release, prepare, check_changes]
    if: github.repository == 'Electivus/Apex-Log-Viewer' && needs.check_changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: Download VSIX artifact from prerelease job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: nightly-vsix
          path: .

      - name: Publish pre-release to Marketplace from VSIX
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT not set; skipping publish." && exit 0
          fi
          shopt -s nullglob
          FILES=( *.vsix )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No VSIX found to publish" >&2
            exit 1
          fi
          for FILE in "${FILES[@]}"; do
            echo "Publishing ${FILE}"
            npx --yes @vscode/vsce publish --packagePath "${FILE}" --pre-release
          done

  publish_open_vsx:
    name: Publish to Open VSX (pre-release channel)
    needs: [assemble_release, prepare, check_changes]
    if: github.repository == 'Electivus/Apex-Log-Viewer' && needs.check_changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: Download VSIX artifact from prerelease job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: nightly-vsix
          path: .

      - name: Publish pre-release to Open VSX from VSIX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT not set; skipping Open VSX publish."
            exit 0
          fi
          shopt -s nullglob
          FILES=( *.vsix )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No VSIX found to publish" >&2
            exit 1
          fi
          for FILE in "${FILES[@]}"; do
            echo "Publishing ${FILE} to Open VSX"
            npx --yes ovsx publish --pat "${OVSX_PAT}" --packagePath "${FILE}" --pre-release
          done

  rollback_prerelease:
    name: Roll back GitHub pre-release (if assembly failed)
    needs: [assemble_release, prepare, check_changes]
    if: >
      always() && needs.check_changes.outputs.has_changes == 'true' &&
      (needs.assemble_release.result == 'failure' || needs.assemble_release.result == 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete GitHub pre-release and tag
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting pre-release $TAG due to assembly failure"
            gh release delete "$TAG" --yes --cleanup-tag
          else
            echo "Pre-release $TAG does not exist; nothing to delete"
          fi
